<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingeniería Mecánica Completa</title>

<style>
body {margin:0; font-family:Arial; background:#0f172a; color:white; display:flex;}
.sidebar {width:280px; background:#020617; padding:20px;}
.sidebar button {width:100%; padding:10px; margin:5px 0; background:#1e293b; color:white; border:none; cursor:pointer;}
.sidebar button:hover {background:#38bdf8;}
.content {flex:1; padding:30px;}
.card {background:#1e293b; padding:15px; border-radius:10px; margin:10px 0;}
a {color:#38bdf8; text-decoration:none;}
</style>
</head>

<body>

<div class="sidebar">
<h2>📚 Ingeniería</h2>

<button onclick="cargar('sem1')">Sem 1</button>
<button onclick="cargar('sem2')">Sem 2</button>
<button onclick="cargar('sem3')">Sem 3</button>
<button onclick="cargar('sem4')">Sem 4</button>
<button onclick="cargar('sem5')">Sem 5</button>
<button onclick="cargar('sem6')">Sem 6</button>
<button onclick="cargar('sem7')">Sem 7</button>
<button onclick="cargar('sem8')">Sem 8</button>

</div>

<div class="content" id="contenido">
<h1>Bienvenido</h1>
<p>Selecciona un semestre</p>
</div>

<script>
function materia(t,d,link){
return `
<div class="card">
<h3>${t}</h3>
<p>${d}</p>
<a href="${link}">Entrar →</a>
</div>`;
}

function cargar(s){

let c = document.getElementById("contenido");

/* SEMESTRE 1 */
if(s=="sem1"){
c.innerHTML = `
<h1>📘 Semestre 1</h1>
${materia("Cálculo I","Límites y derivadas","materias/calculo1.html")}
${materia("Álgebra Lineal","Vectores y matrices","materias/algebra.html")}
${materia("Programación I","Lógica básica","materias/programacion1.html")}
${materia("Estadística","Probabilidad básica","materias/estadistica.html")}
`;
}

/* SEMESTRE 2 */
if(s=="sem2"){
c.innerHTML = `
<h1>📗 Semestre 2</h1>
${materia("Cálculo II","Integrales","materias/calculo2.html")}
${materia("Física I","Movimiento","materias/fisica1.html")}
${materia("CAD","Diseño técnico","materias/cad.html")}
${materia("Programación II","Algoritmos","materias/programacion2.html")}
`;
}

/* SEMESTRE 3 */
if(s=="sem3"){
c.innerHTML = `
<h1>📙 Semestre 3</h1>
${materia("Cálculo III","Multivariable","materias/calculo3.html")}
${materia("Física II","Ondas y calor","materias/fisica2.html")}
${materia("Materiales","Propiedades","materias/materiales.html")}
${materia("Métodos Numéricos","Cálculo computacional","materias/metodos.html")}
`;
}

/* SEMESTRE 4 */
if(s=="sem4"){
c.innerHTML = `
<h1>📕 Semestre 4</h1>
${materia("Ecuaciones Diferenciales","Modelado","materias/ecuaciones.html")}
${materia("Termodinámica I","Energía","materias/termo1.html")}
${materia("Mecánica","Cinemática","materias/mecanica.html")}
`;
}

/* SEMESTRE 5 */
if(s=="sem5"){
c.innerHTML = `
<h1>📓 Semestre 5</h1>
${materia("Resistencia de Materiales","Esfuerzos","materias/resistencia.html")}
${materia("Termodinámica II","Procesos","materias/termo2.html")}
${materia("Fluidos","Dinámica","materias/fluidos.html")}
${materia("Transferencia de Calor","Energía térmica","materias/calor.html")}
`;
}

/* SEMESTRE 6 */
if(s=="sem6"){
c.innerHTML = `
<h1>📒 Semestre 6</h1>
${materia("Diseño Mecánico","Máquinas","materias/diseno.html")}
${materia("Sistemas Dinámicos","Control","materias/sistemas.html")}
${materia("Manufactura","Producción","materias/manufactura.html")}
`;
}

/* SEMESTRE 7 */
if(s=="sem7"){
c.innerHTML = `
<h1>📔 Semestre 7</h1>
${materia("Automatización","Industria","materias/automatizacion.html")}
${materia("Mantenimiento","Gestión","materias/mantenimiento.html")}
${materia("Simulación","Modelos","materias/simulacion.html")}
`;
}

/* SEMESTRE 8 */
if(s=="sem8"){
c.innerHTML = `
<h1>📘 Semestre 8</h1>
${materia("Proyecto de Grado","Trabajo final","materias/proyecto.html")}
${materia("Práctica","Empresa","materias/practica.html")}
`;
}

}
</script>

</body>
</html>
